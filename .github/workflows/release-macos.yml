name: Release App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version
          if command -v codex >/dev/null 2>&1; then codex --version; fi

      - name: Validate tag format
        run: |
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: ${TAG_NAME}. Expected vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Ensure tag exists (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          if ! git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} does not exist. Create and push it first."
            exit 1
          fi

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main
          tag_commit="$(git rev-list -n1 "${TAG_NAME}")"
          if ! git merge-base --is-ancestor "${tag_commit}" "origin/main"; then
            echo "Tag ${TAG_NAME} points to a commit not contained in origin/main."
            exit 1
          fi

      - name: Build DMG
        run: |
          bash scripts/bundle-app.sh release
          mkdir -p build/dist build/dmg-staging
          if [[ -d build/dmg-staging ]]; then find build/dmg-staging -mindepth 1 -delete; fi
          ditto build/dist/MultiCodex.app build/dmg-staging/MultiCodex.app
          ln -snf /Applications build/dmg-staging/Applications
          build_version="$(bash scripts/resolve-build-version.sh)"
          dmg_versioned_path="build/dist/MultiCodex-${build_version}.dmg"
          hdiutil create -volname MultiCodex -srcfolder build/dmg-staging -ov -format UDZO "${dmg_versioned_path}"
          ln -snf "$(basename "${dmg_versioned_path}")" build/dist/MultiCodex.dmg

      - name: Upload release asset
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: build/dist/MultiCodex.dmg
          body_path: .github/release-notes-macos.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
