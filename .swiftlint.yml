included:
  - Sources
  - Tests

excluded:
  - .build
  - build

reporter: "xcode"

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - redundant_nil_coalescing
  - sorted_first_last
  - unused_import
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_function_declarations: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
    - x
    - y
    - z

nesting:
  type_level:
    warning: 2

trailing_whitespace:
  ignores_empty_lines: true
